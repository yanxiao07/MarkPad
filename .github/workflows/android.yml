name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Gradle Wrapper
      # 这一步会在云端直接生成 gradlew，解决你本地无法运行 gradle 的问题
      run: gradle wrapper --gradle-version 8.2

      - name: Generate Wrapper and Build
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -x test -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MarkPad-Final-APK
          path: "app/build/outputs/apk/debug/*.apk"
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -x test
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MarkPad-Final-APK
        path: app/build/outputs/apk/debug/*.apk

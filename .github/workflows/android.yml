name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build with Gradle
        run: |
          # 强制删除所有可能缓存的旧产物目录
          rm -rf app/build/outputs/apk/debug/*

          # 如果没有 gradlew，现场生成一个
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.2
          fi
          chmod +x gradlew

          # 核心编译指令：执行 clean 并重新 assemble
          ./gradlew clean assembleDebug --no-daemon -x test -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MarkPad-PREMIUM-v1.3.0
          path: app/build/outputs/apk/debug/MarkPad_*.apk

name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          # 核心编译指令：先 clean，再编译
          ./gradlew clean assembleDebug --no-daemon -x test -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MarkPad-ULTRA-v1.2.0
          path: app/build/outputs/apk/debug/MarkPad_*.apk
